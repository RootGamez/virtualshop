name = "virtualshop-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# Reemplazar database_id tras correr:
#   pnpm wrangler d1 create virtualshop-db
[[d1_databases]]
binding = "DB"
database_name = "virtualshop-db"
database_id = "REPLACE_WITH_D1_DATABASE_ID"
migrations_dir = "migrations"

# bucket_name debe ser el nombre EXACTO de tu bucket real en Cloudflare
# (el que tiene habilitada la URL pública pub-XXXX.r2.dev).
#   pnpm wrangler r2 bucket create virtualshop-media
# remote = true -> en `wrangler dev` local, este binding usa el bucket REAL de
# Cloudflare (no el R2 local), así las subidas quedan disponibles en la URL r2.dev.
# Requiere estar logueado: `pnpm wrangler login`. La base D1 sigue siendo local.
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "jaw-project"
remote = true

[vars]
# JWT_SECRET real va como secret, NO acá:
#   pnpm wrangler secret put JWT_SECRET
ENVIRONMENT = "development"
# CORS: en producción, descomentar y poner los dominios reales de web y cms.
# En development (ENVIRONMENT="development") se permiten localhost:5173/5174 automáticamente.
# WEB_ORIGIN = "https://tienda.tudominio.com"
# CMS_ORIGIN = "https://admin.tudominio.com"

# Rate limiting nativo de Cloudflare (period solo admite 10 o 60 segundos).
# namespace_id debe ser único por limitador dentro de la cuenta.
# LOGIN_LIMITER: frena fuerza bruta en /api/auth/login (10 intentos/min por IP).
[[unsafe.bindings]]
name = "LOGIN_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 10, period = 60 }

# EVENTS_LIMITER: frena flood de /api/events (público) — 60 eventos/min por IP.
[[unsafe.bindings]]
name = "EVENTS_LIMITER"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 60, period = 60 }

# ============================================================================
# PRODUCCIÓN — desplegar con:  pnpm wrangler deploy --env production
# (o `make deploy-api` desde la raíz). Los entornos de wrangler NO heredan
# vars ni bindings del nivel superior: todo se redeclara acá.
# Secret de producción (una sola vez):
#   pnpm wrangler secret put JWT_SECRET --env production
# ============================================================================
[env.production]
name = "jaw-project-api"

[env.production.vars]
ENVIRONMENT = "production"
# CORS: orígenes permitidos (se aceptan varios separados por coma).
# Se incluyen los dominios *.workers.dev de prueba junto al dominio final.
WEB_ORIGIN = "https://jaw-project.anthonygamez2858.workers.dev,https://jawproject.online"
CMS_ORIGIN = "https://jaw-cms.anthonygamez2858.workers.dev,https://cms.jawproject.online"

[[env.production.d1_databases]]
binding = "DB"
database_name = "jaw-project"
database_id = "ccff9cca-516b-4dae-be3c-b532a4188643"
migrations_dir = "migrations"

[[env.production.r2_buckets]]
binding = "MEDIA"
bucket_name = "jaw-project"

[[env.production.unsafe.bindings]]
name = "LOGIN_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 10, period = 60 }

[[env.production.unsafe.bindings]]
name = "EVENTS_LIMITER"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 60, period = 60 }
